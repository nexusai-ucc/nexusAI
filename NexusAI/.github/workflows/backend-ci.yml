name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'services/api/**'
      - '.github/workflows/backend-ci.yml'

# Permite cancelar runs anteriores cuando se pushean nuevos commits al mismo PR
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # Lint + type check (rápido, no necesita servicios)
  # ----------------------------------------------------------------
  lint:
    name: Ruff + mypy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Skip si services/api/ está vacío
        id: check
        run: |
          if [ ! -f services/api/requirements.txt ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::services/api/requirements.txt no existe todavía. Saltando lint."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python 3.11
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install deps
        if: steps.check.outputs.skip == 'false'
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff check
        if: steps.check.outputs.skip == 'false'
        working-directory: services/api
        run: ruff check app/ tests/

      - name: Ruff format check
        if: steps.check.outputs.skip == 'false'
        working-directory: services/api
        run: ruff format --check app/ tests/

      - name: mypy
        if: steps.check.outputs.skip == 'false'
        working-directory: services/api
        run: mypy app/ --ignore-missing-imports

  # ----------------------------------------------------------------
  # Tests con Postgres+pgvector y Redis reales (no mocks)
  # ----------------------------------------------------------------
  test:
    name: PyTest (Postgres + Redis)
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexusai
          POSTGRES_PASSWORD: nexusai_test
          POSTGRES_DB: nexusai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexusai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENV: test
      DATABASE_URL: postgresql://nexusai:nexusai_test@localhost:5432/nexusai_test
      REDIS_URL: redis://localhost:6379/0
      LLM_API_KEY: test-key-not-real
      LLM_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
      LLM_MODEL: gemini-2.0-flash
      EMBEDDING_API_KEY: test-key-not-real
      EMBEDDING_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai/
      EMBEDDING_MODEL: models/text-embedding-004
      EMBEDDING_DIMENSIONS: 768
      NEXUSAI_SHARED_SECRET: test_shared_secret_not_real_replace_in_prod
      NEXUSAI_API_KEY: test_api_key_not_real_replace_in_prod
      HMAC_REPLAY_WINDOW_SEC: 300
      RATE_LIMIT_PER_USER_DAILY: 50

    steps:
      - uses: actions/checkout@v4

      - name: Skip si no hay tests todavía
        id: check
        run: |
          if [ ! -f services/api/requirements.txt ] || [ ! -d services/api/tests ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::services/api/tests/ no existe todavía. Saltando pytest."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python 3.11
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install deps
        if: steps.check.outputs.skip == 'false'
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Habilitar extensión pgvector
        if: steps.check.outputs.skip == 'false'
        env:
          PGPASSWORD: nexusai_test
        run: psql -h localhost -U nexusai -d nexusai_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Aplicar migraciones (si existen)
        if: steps.check.outputs.skip == 'false'
        working-directory: services/api
        run: |
          if [ -d migrations ]; then
            for f in migrations/*.sql; do
              [ -f "$f" ] || continue
              PGPASSWORD=nexusai_test psql -h localhost -U nexusai -d nexusai_test -f "$f"
            done
          fi

      - name: PyTest con coverage
        if: steps.check.outputs.skip == 'false'
        working-directory: services/api
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: services/api/coverage.xml
          retention-days: 7

  # ----------------------------------------------------------------
  # Build de imagen Docker (sanity check)
  # ----------------------------------------------------------------
  docker-build:
    name: Docker build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Skip si no hay Dockerfile todavía
        id: check
        run: |
          if [ ! -f services/api/Dockerfile ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::services/api/Dockerfile no existe todavía. Saltando build."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build (sin push)
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v5
        with:
          context: services/api
          push: false
          tags: nexusai/api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
