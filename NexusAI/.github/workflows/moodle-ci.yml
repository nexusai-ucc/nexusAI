name: Moodle Plugin CI

on:
  push:
    branches: [main]
    paths:
      - 'plugin/local/nexusai/**'
      - '!plugin/local/nexusai/react/**'
      - '!plugin/local/nexusai/amd/build/**'
      - '.github/workflows/moodle-ci.yml'
  pull_request:
    paths:
      - 'plugin/local/nexusai/**'
      - '!plugin/local/nexusai/react/**'
      - '!plugin/local/nexusai/amd/build/**'
      - '.github/workflows/moodle-ci.yml'

concurrency:
  group: moodle-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Moodle ${{ matrix.moodle-branch }} / PHP ${{ matrix.php }} / ${{ matrix.database }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          # Moodle 4.1 LTS (PHP 7.4 / 8.0 mínimo)
          - php: '8.0'
            moodle-branch: 'MOODLE_401_STABLE'
            database: 'pgsql'
          # Moodle 4.5 LTS (PHP 8.1+)
          - php: '8.1'
            moodle-branch: 'MOODLE_405_STABLE'
            database: 'pgsql'

    services:
      postgres:
        image: pgvector/pgvector:pg14
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Skip si plugin/local/nexusai/version.php no existe todavía
        id: check
        run: |
          if [ ! -f plugin/local/nexusai/version.php ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::plugin/local/nexusai/version.php no existe todavía. Saltando Moodle CI."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout plugin
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        if: steps.check.outputs.skip == 'false'
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pgsql, mbstring, xml, intl, zip, gd, soap
          coverage: none
          ini-values: max_input_vars=5000

      - name: Setup Node 20
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Initialise moodle-plugin-ci
        if: steps.check.outputs.skip == 'false'
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV

      - name: Install Moodle + dependencias del plugin
        if: steps.check.outputs.skip == 'false'
        run: moodle-plugin-ci install --plugin ./plugin/plugin/local/nexusai --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      # ----------------------------------------------------------------
      # Validaciones de calidad de código
      # ----------------------------------------------------------------
      - name: PHP Lint
        if: steps.check.outputs.skip == 'false'
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true
        run: moodle-plugin-ci phpmd

      - name: PHP CodeSniffer (Moodle Coding Standard)
        if: steps.check.outputs.skip == 'false'
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: PHPDoc checker
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true
        run: moodle-plugin-ci phpdoc

      - name: Validating
        if: steps.check.outputs.skip == 'false'
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: steps.check.outputs.skip == 'false'
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: steps.check.outputs.skip == 'false'
        run: moodle-plugin-ci mustache

      - name: Grunt
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      # ----------------------------------------------------------------
      # Tests
      # ----------------------------------------------------------------
      - name: PHPUnit tests
        if: steps.check.outputs.skip == 'false'
        run: moodle-plugin-ci phpunit --fail-on-warning

      - name: Behat features
        if: steps.check.outputs.skip == 'false'
        continue-on-error: true   # Behat puede ser flaky en CI; no bloquear merge por esto en MVP
        run: moodle-plugin-ci behat --profile chrome
