[pytest]
# Configuración pytest para NexusAI backend.

testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*

# pytest-asyncio: ejecutar tests async sin tener que decorarlos a mano.
# "auto" = todo `async def test_*` se trata como async automáticamente.
asyncio_mode = auto

# Marcadores custom (futuros).
markers =
    integration: tests que requieren Postgres/Redis reales (no se corren en CI default)
    slow: tests lentos (skipear con -m "not slow")

# Output más legible.
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Filtros de warnings — silenciar las cosas que no podemos arreglar nosotros.
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:pkg_resources.*
